name: ci

# CI de cam-counter.
#
# IMPORTANTE — POLÍTICA DE INFRA (ver CLAUDE.md §5/§6):
#   El CI de Terraform es SOLO-PLAN: `fmt -check`, `validate` (con -backend=false) y
#   `tflint`. NO usa credenciales AWS, NO ejecuta apply/plan. El `apply` real lo hace el
#   RUNNER MAD de forma autónoma fuera del CI. Esto cierra la escalada de privilegios
#   desde PRs no confiables (F2).

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # Detecta qué áreas cambió el PR para activar selectivamente los jobs.
  changes:
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      edge: ${{ steps.filter.outputs.edge }}
      api: ${{ steps.filter.outputs.api }}
      ui: ${{ steps.filter.outputs.ui }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/ci.yml'
            edge:
              - 'v1/edge/**'
              - '.github/workflows/ci.yml'
            api:
              - 'v1/api/**'
              - 'v1/edge/**'
              - 'contracts/**'
              - '.github/workflows/ci.yml'
            ui:
              - 'v1/ui/**'
              - '.github/workflows/ci.yml'
            e2e:
              - 'v1/ui/**'
              - 'v1/api/**'
              - 'v1/edge/**'
              - 'contracts/**'
              - '.github/workflows/ci.yml'

  # Paquete edge `cam_counter_edge`: lint + tests en x86 SIN Hailo, SIN cámara,
  # SIN red. El Detector importa `hailo_platform` de forma PEREZOSA y el
  # DummyDetector cubre la lógica de conteo en CI. (No toca AWS.)
  edge:
    needs: changes
    if: ${{ needs.changes.outputs.edge == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar paquete edge (x86, sin Hailo)
        run: python -m pip install -e "v1/edge[dev]"

      - name: Import sanity (sin hailo_platform/boto3/cv2 instalados)
        run: |
          python -c "import cam_counter_edge.detector, cam_counter_edge.types, cam_counter_edge.dummy, cam_counter_edge.identifiers, cam_counter_edge.app, cam_counter_edge.sync; print('imports OK')"

      - name: Ruff (lint)
        working-directory: v1/edge
        run: ruff check .

      - name: Mypy (tipos)
        working-directory: v1/edge
        run: mypy cam_counter_edge

      - name: Pytest (sin hardware; supervisor + sync con fakes/DummyDetector)
        working-directory: v1/edge
        # La suite integration_aws se SALTA limpiamente sin credenciales (CI sin
        # OIDC): no rompe el build. `-rs` muestra el motivo del skip.
        run: python -m pytest -q -rs

      - name: Sync offline -> online (drena backlog sin duplicados, con fakes)
        working-directory: v1/edge
        run: python -m pytest -q -k 'idempot or sync_retry or offline or backlog'

  # API local `v1/api` (FastAPI): lint + tipos + tests en x86 SIN Hailo/cámara/red,
  # más verificación de NO-drift del snapshot de /api/openapi.json y del alineado
  # de schemas.py con contracts/. Consume el paquete de borde `cam_counter_edge`.
  api:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # `scripts/version.py` deriva app_version vía git describe

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar borde + deps de la API (runtime + dev, fijadas)
        run: |
          python -m pip install -e v1/edge
          python -m pip install -r v1/api/requirements.txt -r v1/api/requirements-dev.txt

      - name: Ruff (lint)
        working-directory: v1/api
        run: ruff check .

      - name: Mypy (tipos)
        working-directory: v1/api
        run: mypy .

      - name: Pytest (sin hardware; incluye snapshot OpenAPI + alineado contracts/)
        working-directory: v1/api
        run: python -m pytest -q

      - name: App importable con la fuente falsa (sin Pi/Hailo/cámara)
        working-directory: v1/api
        env:
          CAMCOUNTER_FAKE_SOURCE: "1"
        run: python -c 'from app import app; print("paths:", len(app.openapi()["paths"]))'

      - name: OpenAPI snapshot sin drift (regenera y compara con el commiteado)
        working-directory: v1/api
        run: |
          python -m gen_openapi_snapshot
          git diff --exit-code -- openapi.snapshot.json

  # SPA `v1/ui` (React + TS + Vite + Tailwind): typecheck + build de producción.
  # El `dist/` resultante lo sirve FastAPI same-origin (no se commitea; gitignored).
  ui:
    needs: changes
    if: ${{ needs.changes.outputs.ui == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: v1/ui/package-lock.json

      - name: Instalar dependencias (lockfile)
        working-directory: v1/ui
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        working-directory: v1/ui
        run: npx tsc --noEmit

      - name: Build de producción (vite build -> dist/)
        working-directory: v1/ui
        run: npm run build

  # E2E Playwright (headless, x86) contra FastAPI + SPA con la FUENTE FALSA
  # (CAMCOUNTER_FAKE_SOURCE=1): configurar-línea + persistencia tras recarga +
  # incremento del contador en vivo por WS. SIN hardware. La suite integration_aws
  # de AWS NO interviene aquí (es del borde y se salta sin OIDC).
  e2e:
    needs: changes
    if: ${{ needs.changes.outputs.e2e == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # `scripts/version.py` deriva app_version vía git describe

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: v1/ui/package-lock.json

      - name: Instalar borde + deps de la API (para servir la app con fuente falsa)
        run: |
          python -m pip install -e v1/edge
          python -m pip install -r v1/api/requirements.txt

      - name: Instalar deps de la UI + build de producción (dist/ que sirve FastAPI)
        working-directory: v1/ui
        run: |
          npm ci
          npm run build

      - name: Instalar Playwright + navegador (chromium, x86)
        working-directory: v1/ui/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: E2E headless (fuente falsa; arranca Uvicorn vía webServer)
        working-directory: v1/ui/e2e
        env:
          CI: "1"
          CAMCOUNTER_FAKE_SOURCE: "1"
        run: npm test

  # Validación estática de Terraform. SIN credenciales AWS. SIN apply ni plan.
  terraform:
    needs: changes
    if: ${{ needs.changes.outputs.terraform == 'true' }}
    runs-on: ubuntu-latest
    # Sin `permissions: id-token` y sin credenciales AWS: este job NO toca AWS real.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"
          terraform_wrapper: false

      - name: Formato (fmt -check)
        run: terraform fmt -check -recursive terraform/

      - name: Módulo state-backend — init (-backend=false) + validate
        run: |
          terraform -chdir=terraform/modules/state-backend init -backend=false
          terraform -chdir=terraform/modules/state-backend validate

      - name: Módulos PR04 (media-bucket / events-table / device-registry / iam-edge) — init + validate
        run: |
          for m in media-bucket events-table device-registry iam-edge; do
            terraform -chdir="terraform/modules/$m" init -backend=false
            terraform -chdir="terraform/modules/$m" validate
          done

      - name: Raíz prod — init (-backend=false) + validate
        run: |
          terraform -chdir=terraform/environments/prod init -backend=false
          terraform -chdir=terraform/environments/prod validate

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: tflint — init plugins
        run: tflint --chdir=terraform --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: tflint — módulos y raíz
        run: |
          tflint --chdir=terraform/modules/state-backend
          tflint --chdir=terraform/environments/prod
          tflint --chdir=terraform/modules/iam-github-oidc
          tflint --chdir=terraform/modules/media-bucket
          tflint --chdir=terraform/modules/events-table
          tflint --chdir=terraform/modules/device-registry
          tflint --chdir=terraform/modules/iam-edge

  # Plan READ-ONLY de Terraform contra el backend REMOTO compartido, asumiendo el rol PLAN
  # (`cam-counter-gha-plan`) vía OIDC (sin claves estáticas). CI PLAN-ONLY (F2): este job
  # NUNCA ejecuta `apply`. El `apply` de la infraestructura de la pila lo realiza el RUNNER
  # MAD de forma autónoma fuera del CI, con las credenciales de su entorno. El rol PLAN es de
  # SOLO LECTURA (+ escritura mínima al lock para que `plan` adquiera el lock de DynamoDB).
  terraform-plan:
    needs: changes
    if: ${{ needs.changes.outputs.terraform == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # imprescindible para que configure-aws-credentials obtenga el token OIDC
      contents: read
      pull-requests: write  # sólo para publicar el plan como comentario del PR
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # `git describe` ve los tags (versionado SemVer derivado de tags)

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"
          terraform_wrapper: false

      - name: Configurar credenciales AWS por OIDC (rol PLAN, solo lectura)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # ARNs/región vienen de VARIABLES de repositorio (vars.*), NO secrets, NO claves.
          role-to-assume: ${{ vars.GHA_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: cam-counter-gha-plan
          # SIN aws-access-key-id / aws-secret-access-key: autenticación 100% por OIDC.

      - name: Terraform init (backend remoto S3 compartido)
        run: terraform -chdir=terraform/environments/prod init -input=false

      - name: Terraform plan (SOLO LECTURA; jamás apply)
        id: plan
        run: |
          set -o pipefail
          terraform -chdir=terraform/environments/prod plan -no-color -input=false 2>&1 \
            | tee plan_output.txt

      - name: Publicar el plan como comentario del PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('plan_output.txt', 'utf8');
            const plan = raw.length > 60000 ? raw.slice(0, 60000) + '\n... (truncado)' : raw;
            const body = [
              '#### Terraform Plan (read-only, rol PLAN vía OIDC)',
              '',
              '```',
              plan,
              '```',
              '',
              '_CI plan-only (F2): el `apply` lo ejecuta el RUNNER MAD, no GitHub Actions._',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # Escaneo de secretos SÓLO sobre el working-tree del PR (no historia), según política
  # PR00b: la historia pre-rotación contiene el código de cámara ya QUEMADO/ROTADO y
  # escanearla dejaría el job rojo permanentemente. Ver .gitleaks.toml.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Corremos el binario oficial de gitleaks vía su imagen Docker en modo
      # `detect --no-git` (working-tree, NO historia). NO usamos la action por defecto de
      # gitleaks porque escanea toda la historia (git log -p), donde el código de cámara
      # ya rotado seguiría presente y dejaría el job rojo permanentemente (ver .gitleaks.toml).
      - name: gitleaks detect (working-tree, sin historia)
        uses: docker://zricethezav/gitleaks:v8.30.1
        with:
          args: detect --no-git --source /github/workspace --config /github/workspace/.gitleaks.toml --redact --verbose
